<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — AgendaTuCita</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&family=Cormorant+Garamond:wght@400;500;600;700&display=swap');

  :root {
    --primary:     #0C2D48;
    --primary-md:  #1B4F72;
    --primary-lt:  #2980B9;
    --accent:      #1ABC9C;
    --accent-dk:   #148F77;
    --gold:        #C9A84C;
    --gold-lt:     #F0D080;
    --danger:      #DC2626;
    --bg:          #F0F4F8;
    --surface:     #FFFFFF;
    --surface-2:   #F8FAFC;
    --border:      #DDE4EE;
    --border-lt:   #EEF2F7;
    --text:        #0A1628;
    --text-muted:  #64748B;
    --text-light:  #94A3B8;
    --radius:      18px;
    --shadow:      0 8px 40px rgba(12,45,72,.10);
    --shadow-md:   0 16px 56px rgba(12,45,72,.14);
    --shadow-sm:   0 2px 12px rgba(12,45,72,.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; font-size: 15px;
    line-height: 1.65; -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(26,188,156,.05) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(41,128,185,.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ══ HEADER ════════════════════════════════ */
  header {
    background: linear-gradient(150deg, #071828 0%, #0C2D48 40%, #1B4F72 80%, #2980B9 100%);
    color: #fff; padding: 0 28px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(12,45,72,.3);
  }
  header::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 50% 120% at 20% 50%, rgba(201,168,76,.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .header-left { display: flex; align-items: center; gap: 14px; position: relative; }
  .header-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; font-weight: 600; letter-spacing: -.3px;
  }
  .header-sub { font-size: .72rem; opacity: .65; letter-spacing: .5px; text-transform: uppercase; font-weight: 600; }
  .header-divider { width: 1px; height: 28px; background: rgba(255,255,255,.15); margin: 0 4px; }
  .badge-admin {
    background: rgba(201,168,76,.15); border: 1px solid rgba(201,168,76,.35);
    border-radius: 20px; padding: 4px 12px; font-size: .72rem;
    font-weight: 700; color: var(--gold-lt); letter-spacing: .5px;
    position: relative;
  }
  .header-right { display: flex; align-items: center; gap: 10px; position: relative; }
  #admin-name {
    font-size: .82rem; font-weight: 600; color: rgba(255,255,255,.85);
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
    border-radius: 20px; padding: 5px 14px;
  }
  .btn-salir {
    padding: 6px 16px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,.25);
    background: transparent; color: rgba(255,255,255,.7);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: .78rem; font-weight: 700; cursor: pointer;
    transition: all .25s; letter-spacing: .3px;
  }
  .btn-salir:hover { background: rgba(255,255,255,.15); color: #fff; }

  /* ══ LOGIN ════════════════════════════════ */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; padding: 20px; position: relative; z-index: 1;
  }
  .login-card {
    background: var(--surface); border-radius: var(--radius);
    box-shadow: var(--shadow-md); padding: 48px 40px;
    width: 100%; max-width: 420px;
    border: 1px solid var(--border); text-align: center;
    position: relative; overflow: hidden;
  }
  .login-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary), var(--primary-lt), var(--accent));
  }
  .login-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--primary), var(--primary-lt));
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; margin: 0 auto 24px;
    box-shadow: 0 8px 24px rgba(12,45,72,.25);
  }
  .login-card h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem; font-weight: 700; color: var(--primary);
    margin-bottom: 8px; letter-spacing: -.3px;
  }
  .login-card p { color: var(--text-muted); font-size: .9rem; margin-bottom: 32px; line-height: 1.6; }
  .login-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--primary), var(--primary-md), var(--primary-lt));
    color: #fff; border: none; border-radius: 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: .95rem; font-weight: 800; cursor: pointer;
    box-shadow: 0 8px 24px rgba(12,45,72,.3);
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all .3s;
  }
  .login-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(12,45,72,.4); }
  .login-error { color: var(--danger); font-size: .82rem; margin-bottom: 10px; font-weight: 600; }

  /* ══ ADMIN LAYOUT ══════════════════════════ */
  #admin-screen { display: none; }
  .admin-container { max-width: 1120px; margin: 0 auto; padding: 32px 16px 60px; position: relative; z-index: 1; }

  /* ══ STATS ════════════════════════════════ */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 22px; border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    display: flex; align-items: center; gap: 16px;
    transition: all .3s; position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; opacity: 0; transition: opacity .3s;
  }
  .stat-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
  .stat-card:hover::before { opacity: 1; }
  .stat-card.blue::before   { background: linear-gradient(90deg, var(--primary), var(--primary-lt)); }
  .stat-card.green::before  { background: linear-gradient(90deg, var(--accent-dk), var(--accent)); }
  .stat-card.gold::before   { background: linear-gradient(90deg, #92702A, var(--gold)); }
  .stat-card.purple::before { background: linear-gradient(90deg, #6D28D9, #8B5CF6); }
  .stat-icon {
    width: 52px; height: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; flex-shrink: 0;
  }
  .stat-icon.blue   { background: rgba(12,45,72,.08); }
  .stat-icon.green  { background: rgba(26,188,156,.10); }
  .stat-icon.gold   { background: rgba(201,168,76,.10); }
  .stat-icon.purple { background: rgba(109,40,217,.08); }
  .stat-val   { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; color: var(--primary); line-height: 1; }
  .stat-label { font-size: .78rem; color: var(--text-muted); margin-top: 4px; font-weight: 600; letter-spacing: .2px; }

  /* ══ FILTROS ══════════════════════════════ */
  .filters-bar {
    background: var(--surface); border-radius: var(--radius);
    padding: 16px 20px; border: 1px solid var(--border);
    margin-bottom: 20px; box-shadow: var(--shadow-sm);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 7px 18px; border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface-2);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: .82rem; font-weight: 700; cursor: pointer;
    color: var(--text-muted); transition: all .25s;
  }
  .filter-btn.active {
    background: linear-gradient(135deg, var(--primary), var(--primary-lt));
    color: #fff; border-color: transparent;
    box-shadow: 0 4px 12px rgba(12,45,72,.25);
  }
  .filter-btn:hover:not(.active) { border-color: var(--primary-lt); color: var(--primary-md); }
  .filter-sep { color: var(--border); font-size: 1.2rem; }
  input[type="date"] {
    padding: 7px 14px; border-radius: 10px;
    border: 1.5px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: .82rem; color: var(--text);
    outline: none; background: var(--surface-2); font-weight: 500;
  }
  input[type="date"]:focus { border-color: var(--primary-lt); }

  /* ══ CARD ══════════════════════════════════ */
  .card {
    background: var(--surface); border-radius: var(--radius);
    box-shadow: var(--shadow); border: 1px solid rgba(221,228,238,.8);
    margin-bottom: 20px; overflow: hidden;
    transition: box-shadow .3s;
    position: relative;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary-md), var(--primary-lt), var(--accent));
    opacity: 0; transition: opacity .35s;
  }
  .card:hover::before { opacity: 1; }
  .card-header {
    padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border-lt);
  }
  .card-title {
    font-size: .68rem; font-weight: 800; letter-spacing: 1.8px;
    text-transform: uppercase; color: var(--primary-lt);
    display: flex; align-items: center; gap: 8px;
  }
  .card-count {
    background: linear-gradient(135deg, var(--primary), var(--primary-lt));
    color: #fff; border-radius: 20px; padding: 3px 12px;
    font-size: .75rem; font-weight: 800;
    box-shadow: 0 2px 8px rgba(12,45,72,.2);
  }

  /* ══ CITAS ════════════════════════════════ */
  .cita-item {
    padding: 20px 24px; border-bottom: 1px solid var(--border-lt);
    display: grid; grid-template-columns: 60px 1fr auto;
    gap: 18px; align-items: start;
    transition: background .2s;
  }
  .cita-item:last-child { border-bottom: none; }
  .cita-item:hover { background: rgba(12,45,72,.02); }

  .cita-fecha-col { text-align: center; }
  .cita-dia  {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem; font-weight: 700;
    color: var(--primary); line-height: 1;
  }
  .cita-mes  { font-size: .65rem; text-transform: uppercase; color: var(--text-light); letter-spacing: .8px; font-weight: 700; }
  .cita-dow  { font-size: .68rem; color: var(--text-light); font-weight: 600; }

  .cita-info h4 { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .cita-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .cita-tag {
    display: flex; align-items: center; gap: 4px;
    font-size: .75rem; color: var(--text-muted); font-weight: 600;
    background: var(--surface-2); padding: 4px 10px;
    border-radius: 8px; border: 1px solid var(--border);
  }
  .cita-tag.presencial { border-color: rgba(26,188,156,.3); color: var(--accent-dk); background: rgba(26,188,156,.06); }
  .cita-tag.virtual    { border-color: rgba(41,128,185,.3); color: var(--primary-lt); background: rgba(41,128,185,.06); }
  .cita-tag.empresa    { border-color: rgba(201,168,76,.3); color: #92702A; background: rgba(201,168,76,.06); }

  .cita-actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
  .hora-badge {
    background: linear-gradient(135deg, var(--primary), var(--primary-lt));
    color: #fff; border-radius: 10px;
    padding: 5px 12px; font-size: .8rem; font-weight: 700;
    white-space: nowrap; box-shadow: 0 2px 8px rgba(12,45,72,.2);
  }
  .dur-badge {
    background: rgba(26,188,156,.1); color: var(--accent-dk);
    border-radius: 8px; padding: 4px 10px;
    font-size: .75rem; font-weight: 700;
    border: 1px solid rgba(26,188,156,.2);
  }
  .btn-cancel {
    padding: 6px 14px; border-radius: 8px;
    border: 1px solid rgba(220,38,38,.25);
    background: rgba(220,38,38,.05); color: var(--danger);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: .75rem; font-weight: 700; cursor: pointer;
    transition: all .25s; letter-spacing: .2px;
  }
  .btn-cancel:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

  .empty-state { padding: 48px; text-align: center; color: var(--text-light); }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 14px; opacity: .5; }
  .empty-state p { font-size: .9rem; font-weight: 500; }

  /* ══ BLOQUEAR ══════════════════════════════ */
  .block-form {
    padding: 24px;
    display: grid; grid-template-columns: 1fr 1fr auto;
    gap: 14px; align-items: end;
  }
  @media(max-width:600px) { .block-form { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 7px; }
  label { font-size: .72rem; font-weight: 800; color: var(--text-muted); letter-spacing: .8px; text-transform: uppercase; }
  input[type="text"] {
    padding: 12px 14px; border-radius: 12px;
    border: 1.5px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: .9rem; color: var(--text);
    background: var(--surface-2); outline: none;
    transition: all .25s; font-weight: 500;
  }
  input[type="text"]:focus { border-color: var(--primary-lt); background: #fff; box-shadow: 0 0 0 4px rgba(41,128,185,.10); }

  /* ══ BUTTONS ══════════════════════════════ */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 22px; border-radius: 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: .88rem; font-weight: 800; cursor: pointer; border: none;
    transition: all .3s cubic-bezier(.34,1.56,.64,1); letter-spacing: .3px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-md), var(--primary-lt));
    color: #fff; box-shadow: 0 6px 20px rgba(12,45,72,.3);
    position: relative; overflow: hidden;
  }
  .btn-primary::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
    transition: left .5s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(12,45,72,.4); }
  .btn-primary:hover::before { left: 100%; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-ghost { background: var(--surface); color: var(--text-muted); border: 1.5px solid var(--border); box-shadow: var(--shadow-sm); }
  .btn-ghost:hover { background: var(--bg); color: var(--text); border-color: var(--primary-lt); }
  .btn-danger { background: var(--danger); color: #fff; box-shadow: 0 4px 16px rgba(220,38,38,.3); flex: 1; }
  .btn-danger:hover { background: #B91C1C; transform: translateY(-1px); }

  /* ══ MODAL ════════════════════════════════ */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(10,22,40,.5); backdrop-filter: blur(4px);
    z-index: 200; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: var(--radius);
    padding: 32px; max-width: 420px; width: 100%;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border);
    animation: modalIn .3s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes modalIn {
    0%   { transform: scale(.9) translateY(10px); opacity: 0; }
    100% { transform: scale(1)  translateY(0);    opacity: 1; }
  }
  .modal h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 10px;
  }
  .modal p  { color: var(--text-muted); font-size: .9rem; line-height: 1.6; margin-bottom: 24px; }
  .modal-btns { display: flex; gap: 10px; }

  /* ══ ALERTS ═══════════════════════════════ */
  .alert-success { background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; border-radius: 10px; padding: 12px 16px; font-size: .85rem; font-weight: 600; }
  .alert-error   { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; border-radius: 10px; padding: 12px 16px; font-size: .85rem; font-weight: 600; }

  /* ══ LOADER ═══════════════════════════════ */
  .loader { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 40px; color: var(--text-muted); font-size: .9rem; font-weight: 500; }
  .spinner { width: 24px; height: 24px; border: 2.5px solid var(--border); border-top-color: var(--primary-lt); border-radius: 50%; animation: spin .75s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ══ ANALYTICS DASHBOARD ══════════════════ */
  .analytics-section {
    margin-bottom: 20px;
  }
  .analytics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  @media(max-width: 700px) { .analytics-grid { grid-template-columns: 1fr; } }

  .chart-card {
    background: var(--surface); border-radius: var(--radius);
    box-shadow: var(--shadow); border: 1px solid rgba(221,228,238,.8);
    overflow: hidden; position: relative;
  }
  .chart-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary-md), var(--primary-lt), var(--accent));
    opacity: 0; transition: opacity .35s;
  }
  .chart-card:hover::before { opacity: 1; }
  .chart-card.full-width { grid-column: 1 / -1; }
  .chart-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border-lt);
    display: flex; align-items: center; gap: 8px;
  }
  .chart-title {
    font-size: .68rem; font-weight: 800; letter-spacing: 1.8px;
    text-transform: uppercase; color: var(--primary-lt);
  }
  .chart-body { padding: 20px; }

  /* ══ CALENDARIO MENSUAL INTERACTIVO ══════ */
  .cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .cal-nav-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1.5px solid var(--border); background: var(--surface-2);
    font-size: 1rem; cursor: pointer; color: var(--primary-md);
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; font-weight: 700;
  }
  .cal-nav-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
  .cal-month-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem; font-weight: 700; color: var(--primary);
    letter-spacing: -.3px;
  }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-dow {
    text-align: center; font-size: .62rem; font-weight: 800;
    color: var(--text-light); letter-spacing: .8px;
    text-transform: uppercase; padding: 4px 0 8px;
  }
  .cal-cell {
    border-radius: 10px; min-height: 62px; padding: 6px;
    border: 1.5px solid transparent;
    background: var(--surface-2);
    cursor: pointer; transition: all .2s;
    position: relative; overflow: hidden;
  }
  .cal-cell.empty { background: transparent; cursor: default; border-color: transparent; }
  .cal-cell:not(.empty):hover { border-color: var(--primary-lt); background: #fff; transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .cal-cell.hoy { border-color: var(--gold) !important; background: rgba(201,168,76,.06); }
  .cal-cell.selected { border-color: var(--primary-lt) !important; background: rgba(41,128,185,.07); box-shadow: 0 0 0 3px rgba(41,128,185,.15); }
  .cal-cell.tiene-citas { background: #fff; border-color: rgba(26,188,156,.25); }
  .cal-cell-num {
    font-size: .75rem; font-weight: 800; color: var(--text-muted);
    line-height: 1; margin-bottom: 4px;
  }
  .cal-cell.hoy .cal-cell-num { color: var(--gold); }
  .cal-cell.tiene-citas .cal-cell-num { color: var(--primary); }
  .cal-dot-wrap { display: flex; flex-wrap: wrap; gap: 2px; }
  .cal-dot {
    height: 6px; border-radius: 3px;
    background: var(--accent); flex-shrink: 0;
    transition: width .3s;
  }
  .cal-dot.presencial { background: var(--accent); }
  .cal-dot.virtual    { background: var(--primary-lt); }
  .cal-count-badge {
    position: absolute; bottom: 5px; right: 6px;
    font-size: .6rem; font-weight: 800; color: var(--accent-dk);
    background: rgba(26,188,156,.12); border-radius: 6px; padding: 1px 5px;
    border: 1px solid rgba(26,188,156,.2);
  }

  /* Panel detalle día */
  .day-detail-panel {
    background: linear-gradient(135deg, rgba(12,45,72,.03), rgba(41,128,185,.04));
    border: 1.5px solid var(--border);
    border-radius: 14px; padding: 16px 18px;
    margin-top: 14px; display: none;
    animation: slideDown .25s ease;
  }
  .day-detail-panel.open { display: block; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .day-detail-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem; font-weight: 700; color: var(--primary);
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .day-cita-pill {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border);
    margin-bottom: 6px; cursor: pointer; transition: all .2s;
  }
  .day-cita-pill:hover { border-color: var(--primary-lt); background: rgba(41,128,185,.04); }
  .day-cita-hora { font-size: .78rem; font-weight: 800; color: var(--primary); min-width: 48px; }
  .day-cita-nombre { font-size: .82rem; font-weight: 700; color: var(--text); flex: 1; }
  .day-cita-empresa { font-size: .72rem; color: #92702A; background: rgba(201,168,76,.1); border-radius: 6px; padding: 2px 8px; font-weight: 700; }
  .day-cita-modal { font-size: .68rem; font-weight: 700; border-radius: 6px; padding: 2px 8px; }
  .day-cita-modal.presencial { background: rgba(26,188,156,.1); color: var(--accent-dk); }
  .day-cita-modal.virtual    { background: rgba(41,128,185,.1); color: var(--primary-lt); }

  /* Barras semanales */
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 120px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .bar-fill {
    width: 100%; border-radius: 6px 6px 0 0;
    background: linear-gradient(180deg, var(--primary-lt), var(--primary));
    min-height: 4px; transition: height .4s cubic-bezier(.34,1.56,.64,1);
    position: relative;
  }
  .bar-fill:hover { background: linear-gradient(180deg, var(--accent), var(--accent-dk)); }
  .bar-val { font-size: .68rem; font-weight: 800; color: var(--primary); }
  .bar-label { font-size: .6rem; color: var(--text-light); font-weight: 600; text-align: center; white-space: nowrap; }

  /* Dona presencial/virtual */
  .donut-wrap { display: flex; align-items: center; gap: 20px; }
  .donut-svg { flex-shrink: 0; }
  .donut-legend { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .donut-item { display: flex; align-items: center; gap: 8px; }
  .donut-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .donut-item-label { font-size: .78rem; color: var(--text-muted); font-weight: 600; }
  .donut-item-val { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-left: auto; }

  /* Top empresas */
  .empresa-list { display: flex; flex-direction: column; gap: 10px; }
  .empresa-row { display: flex; align-items: center; gap: 10px; }
  .empresa-rank {
    width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-lt));
    color: #fff; font-size: .7rem; font-weight: 800;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .empresa-bar-wrap { flex: 1; }
  .empresa-name { font-size: .78rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .empresa-bar-bg { background: var(--surface-2); border-radius: 4px; height: 8px; overflow: hidden; border: 1px solid var(--border); }
  .empresa-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent-dk), var(--accent)); transition: width .6s cubic-bezier(.34,1.56,.64,1); }
  .empresa-count { font-size: .82rem; font-weight: 800; color: var(--primary); min-width: 24px; text-align: right; }

  /* ══ PANEL LATERAL EMPRESA ════════════════ */
  .empresa-panel-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(10,22,40,.45); backdrop-filter: blur(3px);
    z-index: 300;
  }
  .empresa-panel-overlay.open { display: block; }
  .empresa-panel {
    position: fixed; top: 0; right: -480px; width: 460px; max-width: 95vw;
    height: 100vh; background: var(--surface);
    box-shadow: -8px 0 48px rgba(12,45,72,.18);
    z-index: 301; display: flex; flex-direction: column;
    transition: right .35s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }
  .empresa-panel.open { right: 0; }
  .ep-header {
    padding: 22px 24px 18px;
    background: linear-gradient(135deg, #071828, #0C2D48, #1B4F72);
    color: #fff; flex-shrink: 0;
  }
  .ep-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .ep-nombre {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; font-weight: 700; letter-spacing: -.3px;
  }
  .ep-close {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.1);
    color: #fff; font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .ep-close:hover { background: rgba(255,255,255,.25); }
  .ep-stats-row { display: flex; gap: 16px; margin-top: 10px; }
  .ep-stat { text-align: center; }
  .ep-stat-val { font-family: 'Cormorant Garamond',serif; font-size: 1.4rem; font-weight: 700; line-height:1; }
  .ep-stat-lbl { font-size: .62rem; opacity: .65; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }

  /* Estado selector */
  .ep-estado-row { display: flex; gap: 8px; padding: 14px 24px; border-bottom: 1px solid var(--border-lt); flex-shrink: 0; }
  .ep-estado-btn {
    flex: 1; padding: 8px 4px; border-radius: 10px; border: 2px solid transparent;
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: .72rem; font-weight: 800;
    cursor: pointer; transition: all .2s; text-align: center;
  }
  .ep-estado-btn.normal   { background: rgba(26,188,156,.08);  color: #065F46; border-color: rgba(26,188,156,.2); }
  .ep-estado-btn.pendiente{ background: rgba(234,179,8,.08);   color: #854D0E; border-color: rgba(234,179,8,.2); }
  .ep-estado-btn.novedad  { background: rgba(220,38,38,.08);   color: #991B1B; border-color: rgba(220,38,38,.2); }
  .ep-estado-btn.normal.active   { background: rgba(26,188,156,.2);  border-color: #1ABC9C; }
  .ep-estado-btn.pendiente.active{ background: rgba(234,179,8,.2);   border-color: #EAB308; }
  .ep-estado-btn.novedad.active  { background: rgba(220,38,38,.2);   border-color: #DC2626; }

  .ep-body { flex: 1; overflow-y: auto; padding: 18px 24px; display: flex; flex-direction: column; gap: 18px; }

  /* Notas */
  .ep-section-title { font-size: .65rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--primary-lt); margin-bottom: 8px; }
  .ep-nota-area {
    width: 100%; min-height: 90px; border-radius: 12px;
    border: 1.5px solid var(--border); padding: 12px 14px;
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: .88rem;
    color: var(--text); background: var(--surface-2); resize: vertical;
    outline: none; line-height: 1.6; transition: all .25s;
  }
  .ep-nota-area:focus { border-color: var(--primary-lt); background: #fff; box-shadow: 0 0 0 4px rgba(41,128,185,.08); }
  .ep-nota-actions { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  .ep-save-btn {
    padding: 8px 18px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, var(--primary), var(--primary-lt));
    color: #fff; font-family: 'Plus Jakarta Sans',sans-serif;
    font-size: .78rem; font-weight: 800; cursor: pointer;
    transition: all .25s; box-shadow: 0 3px 10px rgba(12,45,72,.2);
  }
  .ep-save-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(12,45,72,.3); }
  .ep-saved-lbl { font-size: .72rem; color: var(--accent-dk); font-weight: 700; opacity: 0; transition: opacity .3s; }
  .ep-saved-lbl.show { opacity: 1; }

  /* Contacto */
  .ep-contacto-input {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--surface-2);
    font-family: 'Plus Jakarta Sans',sans-serif; font-size: .88rem; color: var(--text);
    outline: none; transition: all .25s; font-weight: 500;
  }
  .ep-contacto-input:focus { border-color: var(--primary-lt); background: #fff; }

  /* Historial en panel */
  .ep-hist-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 10px;
    background: var(--surface-2); border: 1px solid var(--border);
    margin-bottom: 6px; font-size: .78rem;
  }
  .ep-hist-fecha { font-weight: 800; color: var(--primary); min-width: 70px; }
  .ep-hist-detalle { flex: 1; color: var(--text-muted); }
  .ep-hist-modal { font-size: .68rem; font-weight: 700; border-radius: 6px; padding: 2px 8px; }
  .ep-hist-modal.presencial { background: rgba(26,188,156,.1); color: var(--accent-dk); }
  .ep-hist-modal.virtual    { background: rgba(41,128,185,.1); color: var(--primary-lt); }

  /* ══ ESTADO BADGE en cita ══════════════════ */
  .estado-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: .7rem; font-weight: 800; border-radius: 20px;
    padding: 3px 10px; cursor: pointer; border: 1.5px solid transparent;
    transition: all .2s; flex-shrink: 0;
  }
  .estado-badge.normal    { background: rgba(26,188,156,.1);  color: #065F46; border-color: rgba(26,188,156,.25); }
  .estado-badge.pendiente { background: rgba(234,179,8,.1);   color: #854D0E; border-color: rgba(234,179,8,.3); }
  .estado-badge.novedad   { background: rgba(220,38,38,.1);   color: #991B1B; border-color: rgba(220,38,38,.25); }
  .cita-tag.empresa-clickable { cursor: pointer; transition: all .2s; }
  .cita-tag.empresa-clickable:hover { background: rgba(201,168,76,.15); border-color: var(--gold); color: #7A5C20; transform: translateY(-1px); }

  /* ══ ANIMACIONES DE ENTRADA ══════════════ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-gold {
    0%,100% { box-shadow: 0 0 0 0 rgba(201,168,76,.4); }
    50%      { box-shadow: 0 0 0 7px rgba(201,168,76,.0); }
  }
  @keyframes countUp {
    from { opacity: 0; transform: scale(.7); }
    to   { opacity: 1; transform: scale(1); }
  }

  .stats-grid .stat-card { animation: fadeUp .5s ease both; }
  .stats-grid .stat-card:nth-child(1) { animation-delay: .05s; }
  .stats-grid .stat-card:nth-child(2) { animation-delay: .12s; }
  .stats-grid .stat-card:nth-child(3) { animation-delay: .19s; }
  .stats-grid .stat-card:nth-child(4) { animation-delay: .26s; }

  .stat-val { animation: countUp .6s cubic-bezier(.34,1.56,.64,1) both; animation-delay: .4s; }

  /* Stat-cards más vividas */
  .stat-card.blue  { border-left: 4px solid var(--primary-lt); }
  .stat-card.green { border-left: 4px solid var(--accent); }
  .stat-card.gold  { border-left: 4px solid var(--gold); }
  .stat-card.purple{ border-left: 4px solid #8B5CF6; }

  /* Calendario — día de hoy pulsa */
  .cal-cell.hoy { animation: pulse-gold 2.5s ease-in-out infinite; }

  /* Analytics cards entrada */
  .chart-card { animation: fadeUp .5s ease both; }
  .analytics-grid .chart-card:nth-child(1) { animation-delay: .1s; }
  .analytics-grid .chart-card:nth-child(2) { animation-delay: .2s; }
  .analytics-grid .chart-card:nth-child(3) { animation-delay: .3s; }
  .analytics-grid .chart-card:nth-child(4) { animation-delay: .4s; }

  /* Línea de tendencia */
  .trend-dot {
    transition: r .2s, fill .2s;
    cursor: pointer;
  }
  .trend-dot:hover { r: 7; }

  /* Top empresas — filas con hover más vivo */
  .empresa-row:hover .empresa-name { color: var(--primary-lt); }
  .empresa-row:hover .empresa-rank { transform: scale(1.15); }
  .empresa-rank { transition: transform .2s; }

  /* Citas card — borde izquierdo de color por estado */
  .cita-item.estado-pendiente { border-left: 3px solid #EAB308; }
  .cita-item.estado-novedad   { border-left: 3px solid var(--danger); }
  .cita-item.estado-normal    { border-left: 3px solid var(--accent); }

  /* ══ FOOTER ═══════════════════════════════ */
  footer {
    text-align: center; padding: 24px;
    font-size: .78rem; color: var(--text-light);
    border-top: 1px solid var(--border-lt);
    position: relative; z-index: 1; letter-spacing: .3px;
  }
  footer strong { color: var(--primary-md); font-weight: 700; }
  /* ══ TABS ══════════════════════════════════ */
  .tabs-bar {
    display: flex; gap: 3px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 4px; width: fit-content; margin-bottom: 22px;
    box-shadow: var(--shadow-sm); position: relative; z-index: 1;
  }
  .tab-btn {
    font-size: .75rem; font-weight: 700; padding: 8px 18px;
    border-radius: 10px; color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; gap: 6px; border: none;
    background: transparent; font-family: 'Plus Jakarta Sans', sans-serif;
    transition: all .2s; letter-spacing: .2px;
  }
  .tab-btn.active { background: var(--primary); color: #fff; }
  .tab-btn:not(.active):hover { background: var(--surface-2); color: var(--text); }
  .tab-badge {
    font-size: .62rem; padding: 1px 7px; border-radius: 20px;
    background: rgba(255,255,255,.15); color: rgba(255,255,255,.8);
  }
  .tab-badge.alerta { background: rgba(220,38,38,.12); color: var(--danger); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ══ SEGUIMIENTO ══════════════════════════ */
  .seg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  @media(max-width:700px) { .seg-grid { grid-template-columns: 1fr; } }

  .seg-card {
    background: var(--surface); border-radius: var(--radius);
    box-shadow: var(--shadow-sm); border: 1px solid var(--border);
    overflow: hidden;
  }
  .seg-card-hdr {
    padding: 14px 18px; border-bottom: 1px solid var(--border-lt);
    display: flex; align-items: center; justify-content: space-between;
  }
  .seg-card-ttl {
    font-size: .68rem; font-weight: 800; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .9px;
  }
  .seg-card-body { padding: 14px 18px; }
  .seg-add-btn {
    font-size: .68rem; font-weight: 700; color: var(--primary-lt);
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px; cursor: pointer;
    font-family: 'Plus Jakarta Sans',sans-serif; transition: all .2s;
  }
  .seg-add-btn:hover { background: var(--primary-lt); color: #fff; border-color: var(--primary-lt); }

  /* Alertas */
  .alert-list { display: flex; flex-direction: column; gap: 7px; }
  .alert-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 10px; border: 1px solid transparent;
  }
  .alert-row.crit { background: rgba(220,38,38,.06); border-color: rgba(220,38,38,.2); }
  .alert-row.warn { background: rgba(201,168,76,.06); border-color: rgba(201,168,76,.2); }
  .alert-row.ok   { background: rgba(26,188,156,.06); border-color: rgba(26,188,156,.2); }
  .alert-txt { flex: 1; font-size: .78rem; color: var(--text); line-height: 1.4; }
  .alert-txt strong { font-weight: 700; }
  .alert-pill {
    font-size: .62rem; padding: 3px 9px; border-radius: 20px;
    font-weight: 700; white-space: nowrap;
  }
  .ap-c { background: rgba(220,38,38,.1); color: var(--danger); border: 1px solid rgba(220,38,38,.2); }
  .ap-w { background: rgba(201,168,76,.1); color: #92702A; border: 1px solid rgba(201,168,76,.25); }
  .ap-o { background: rgba(26,188,156,.1); color: var(--accent-dk); border: 1px solid rgba(26,188,156,.2); }
  .alert-time { font-size: .62rem; color: var(--text-light); white-space: nowrap; }

  /* Visitas */
  .visit-list { display: flex; flex-direction: column; gap: 7px; }
  .visit-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 10px;
    background: var(--surface-2); border: 1px solid var(--border-lt);
    cursor: pointer; transition: all .2s;
  }
  .visit-row:hover { border-color: var(--primary-lt); background: rgba(41,128,185,.04); }
  .vdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .vd-ok { background: var(--accent); }
  .vd-w  { background: var(--gold); }
  .vd-c  { background: var(--danger); }
  .vname { font-size: .78rem; font-weight: 700; color: var(--text); flex: 1; }
  .vmeta { font-size: .65rem; color: var(--text-light); margin-top: 1px; }
  .vbadge {
    font-size: .62rem; padding: 2px 8px; border-radius: 20px;
    font-weight: 700; display: inline-block;
  }
  .vb-ok { background: rgba(26,188,156,.1); color: var(--accent-dk); }
  .vb-w  { background: rgba(201,168,76,.1); color: #92702A; }
  .vb-c  { background: rgba(220,38,38,.1); color: var(--danger); }
  .vnext { font-size: .68rem; font-weight: 700; text-align: right; margin-bottom: 3px; }
  .vn-ok { color: var(--accent-dk); } .vn-w { color: #92702A; } .vn-c { color: var(--danger); }

  /* Procesos */
  .proc-list { display: flex; flex-direction: column; gap: 8px; }
  .proc-row {
    padding: 10px 12px; border-radius: 10px;
    background: var(--surface-2); border: 1px solid var(--border-lt);
  }
  .proc-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .pname { font-size: .78rem; font-weight: 700; color: var(--text); }
  .pemp  { font-size: .65rem; color: var(--text-light); margin-top: 1px; }
  .pvence { font-size: .68rem; font-weight: 700; white-space: nowrap; }
  .pv-ok { color: var(--accent-dk); } .pv-w { color: #92702A; } .pv-c { color: var(--danger); }
  .prog-bg { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
  .pf-blue { background: var(--primary-lt); }
  .pf-gold { background: var(--gold); }
  .pf-green { background: var(--accent); }
  .pf-red { background: var(--danger); }
  .prog-meta { display: flex; justify-content: space-between; margin-top: 4px; }
  .pmeta-lbl { font-size: .62rem; color: var(--text-light); }
  .pmeta-pct { font-size: .65rem; font-weight: 700; color: var(--text-muted); }

  /* Modales seguimiento */
  .seg-modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(10,22,40,.5); z-index: 400;
    align-items: center; justify-content: center; padding: 20px;
  }
  .seg-modal-overlay.open { display: flex; }
  .seg-modal {
    background: var(--surface); border-radius: var(--radius);
    padding: 28px; max-width: 400px; width: 100%;
    box-shadow: var(--shadow-md); animation: fadeUp .2s ease;
  }
  .seg-modal h3 {
    font-family: 'Cormorant Garamond',serif; font-size: 1.3rem;
    font-weight: 700; color: var(--primary); margin-bottom: 16px;
  }
  .seg-input {
    width: 100%; padding: 10px 13px; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--surface-2);
    font-family: 'Plus Jakarta Sans',sans-serif; font-size: .82rem;
    color: var(--text); outline: none; transition: all .2s; margin-bottom: 10px;
  }
  .seg-input:focus { border-color: var(--primary-lt); background: #fff; }
  .seg-modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  .seg-btn-cancel {
    flex: 1; padding: 9px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface-2);
    color: var(--text-muted); font-family: 'Plus Jakarta Sans',sans-serif;
    font-size: .78rem; font-weight: 700; cursor: pointer;
  }
  .seg-btn-save {
    flex: 2; padding: 9px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, var(--primary), var(--primary-lt));
    color: #fff; font-family: 'Plus Jakarta Sans',sans-serif;
    font-size: .78rem; font-weight: 700; cursor: pointer; transition: all .2s;
  }
  .seg-btn-save:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .last-update-lbl { font-size: .68rem; color: var(--text-light); }

  /* ══ LAYOUT DOS COLUMNAS AGENDA ══════════ */
  .agenda-two-col {
    display: grid; grid-template-columns: 1fr 290px; gap: 16px; align-items: start;
  }
  .agenda-main-col { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
  .agenda-side-col { display: flex; flex-direction: column; gap: 14px; position: sticky; top: 80px; }

  @media(max-width:900px) {
    .agenda-two-col { grid-template-columns: 1fr; }
    .agenda-side-col { position: static; }
  }

  /* ══ SIDE CARDS ══════════════════════════ */
  .side-card {
    background: var(--surface); border-radius: var(--radius);
    box-shadow: var(--shadow-sm); border: 1px solid var(--border);
    padding: 16px 18px; overflow: hidden;
  }
