<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgendaTuCita</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1B4F72;--accent:#1ABC9C;--gold:#C9A84C;
  --primary-dk:#0f2d42;--primary-lt:#2E86C1;
}
body{
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  background:linear-gradient(145deg,var(--primary-dk) 0%,var(--primary) 50%,var(--primary-lt) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}

/* ── Partículas de fondo ─────────────── */
.particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.particle{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.06);
  animation:float linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:.6}
  100%{transform:translateY(-20vh) scale(1.2);opacity:0}
}

/* ── Tarjeta principal ───────────────── */
.card{
  position:relative;z-index:10;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.18);
  border-radius:28px;
  padding:52px 44px 44px;
  width:100%;max-width:440px;
  text-align:center;
  box-shadow:0 32px 80px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.08);
  animation:cardIn .7s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(32px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ── Logo ────────────────────────────── */
.logo-wrap{
  width:88px;height:88px;border-radius:22px;
  background:linear-gradient(135deg,var(--accent),rgba(255,255,255,.15));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  box-shadow:0 8px 32px rgba(0,0,0,.25), 0 0 0 6px rgba(255,255,255,.08);
  animation:logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse{
  0%,100%{box-shadow:0 8px 32px rgba(0,0,0,.25), 0 0 0 6px rgba(255,255,255,.08)}
  50%{box-shadow:0 8px 32px rgba(0,0,0,.25), 0 0 0 12px rgba(255,255,255,.04)}
}
.logo-svg{width:46px;height:46px}

/* ── Marca ───────────────────────────── */
.brand{
  font-family:'Playfair Display',serif;
  font-size:.78rem;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.55);font-weight:600;
  margin-bottom:6px;
}
.divider{
  width:40px;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  margin:14px auto;border-radius:2px;
}

/* ── Nombre profesional ──────────────── */
.prof-name{
  font-family:'Playfair Display',serif;
  font-size:1.85rem;font-weight:700;
  color:#fff;line-height:1.15;
  margin-bottom:8px;
  text-shadow:0 2px 16px rgba(0,0,0,.3);
}
.prof-specialty{
  font-size:.92rem;font-weight:500;
  color:rgba(255,255,255,.75);
  margin-bottom:6px;line-height:1.4;
}
.prof-city{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;padding:4px 14px;
  font-size:.78rem;color:rgba(255,255,255,.8);
  font-weight:600;margin-top:6px;
}

/* ── Mensaje ─────────────────────────── */
.welcome{
  font-size:.87rem;color:rgba(255,255,255,.65);
  line-height:1.6;margin:22px 0 28px;
  padding:0 4px;
}

/* ── Botón principal ─────────────────── */
.btn-agenda{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:17px 24px;
  background:linear-gradient(135deg,var(--accent),#16a085);
  color:#fff;border:none;border-radius:14px;
  font-family:'DM Sans',sans-serif;
  font-size:1.05rem;font-weight:700;
  cursor:pointer;text-decoration:none;
  box-shadow:0 8px 32px rgba(26,188,156,.4);
  transition:all .25s cubic-bezier(.22,1,.36,1);
  position:relative;overflow:hidden;
  letter-spacing:.3px;
}
.btn-agenda::before{
  content:'';position:absolute;
  top:-50%;left:-60%;width:40%;height:200%;
  background:rgba(255,255,255,.18);
  transform:skewX(-20deg);
  animation:shine 3.5s ease-in-out infinite;
}
@keyframes shine{
  0%{left:-60%}60%,100%{left:140%}
}
.btn-agenda:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(26,188,156,.55);
}
.btn-agenda:active{transform:translateY(0)}

/* ── Botón admin ─────────────────────── */
.btn-admin{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:16px;padding:8px 18px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;
  font-family:'DM Sans',sans-serif;
  font-size:.78rem;font-weight:600;
  color:rgba(255,255,255,.55);
  text-decoration:none;cursor:pointer;
  transition:all .2s;
}
.btn-admin:hover{
  background:rgba(255,255,255,.13);
  color:rgba(255,255,255,.8);
}

/* ── Footer ──────────────────────────── */
footer{
  position:relative;z-index:10;
  margin-top:28px;
  font-size:.72rem;color:rgba(255,255,255,.3);
  letter-spacing:.5px;text-align:center;
}
footer strong{color:rgba(255,255,255,.5)}

/* ── Responsive ──────────────────────── */
@media(max-width:480px){
  .card{padding:40px 28px 36px;margin:16px}
  .prof-name{font-size:1.55rem}
}
</style>
</head>
<body>

<!-- Partículas -->
<div class="particles" id="particles"></div>

<!-- Tarjeta principal -->
<div class="card">

  <!-- Logo AgendaTuCita -->
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="8" width="38" height="34" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
      <rect x="4" y="8" width="38" height="12" rx="6" fill="rgba(255,255,255,0.25)"/>
      <line x1="15" y1="4" x2="15" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="31" y1="4" x2="31" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="11" y="26" width="7" height="7" rx="2" fill="white" opacity="0.9"/>
      <rect x="21" y="26" width="7" height="7" rx="2" fill="white" opacity="0.7"/>
      <rect x="31" y="26" width="7" height="7" rx="2" fill="white" opacity="0.5"/>
      <circle cx="35" cy="35" r="8" fill="#1ABC9C"/>
      <path d="M31.5 35l2.5 2.5 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="brand">AgendaTuCita</div>
  <div class="divider"></div>

  <div class="prof-name" id="prof-name">Cargando...</div>
  <div class="prof-specialty" id="prof-specialty"></div>
  <div class="prof-city">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
    <span id="prof-city">Colombia</span>
  </div>

  <p class="welcome" id="welcome-msg">
    Agenda tu cita de forma fácil y rápida.<br>Consulta disponibilidad en tiempo real.
  </p>

  <a class="btn-agenda" id="btn-agendar" href="#">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Agendar mi cita
  </a>



</div>

<footer><strong>AgendaTuCita</strong> &nbsp;·&nbsp; Sistema de agendamiento profesional</footer>

<script>
// ── Leer parámetros ──────────────────────────────
function getP(){
  var p = new URLSearchParams(window.location.search);
  return {
    name:       p.get('name')       || 'Profesional',
    profession: p.get('profession') || 'Agenda tu cita',
    city:       p.get('city')       || '',
    department: p.get('department') || '',
    primary:    p.get('primary')    || '#1B4F72',
    accent:     p.get('accent')     || '#1ABC9C',
    gold:       p.get('gold')       || '#C9A84C',
    email:      p.get('email')      || '',
    api_key:    p.get('api_key')    || '',
    apps_script:p.get('apps_script')|| '',
    am_start:   p.get('am_start')   || '07:00',
    am_end:     p.get('am_end')     || '12:00',
    pm_enabled: p.get('pm_enabled') || '1',
    pm_start:   p.get('pm_start')   || '14:00',
    pm_end:     p.get('pm_end')     || '17:00',
    days:       p.get('days')       || '1,2,3,4,5',
    duration:   p.get('duration')   || '1',
    buffer:     p.get('buffer')     || '0'
  };
}

var cfg = getP();

// ── Aplicar colores ──────────────────────────────
function lighten(c,p){var n=parseInt(c.replace('#',''),16),a=Math.round(2.55*p),R=(n>>16)+a,G=(n>>8&255)+a,B=(n&255)+a;return'#'+(0x1000000+Math.min(255,Math.max(0,R))*0x10000+Math.min(255,Math.max(0,G))*0x100+Math.min(255,Math.max(0,B))).toString(16).slice(1);}
function darken(c,p){return lighten(c,-p);}

document.documentElement.style.setProperty('--primary',    cfg.primary);
document.documentElement.style.setProperty('--primary-dk', darken(cfg.primary, 18));
document.documentElement.style.setProperty('--primary-lt', lighten(cfg.primary, 18));
document.documentElement.style.setProperty('--accent',     cfg.accent);
document.documentElement.style.setProperty('--gold',       cfg.gold);

// Actualizar ícono de check en el logo con el color accent
document.querySelector('.logo-wrap').style.background =
  'linear-gradient(135deg,' + cfg.accent + ',rgba(255,255,255,0.1))';

// ── Contenido dinámico ───────────────────────────
document.getElementById('prof-name').textContent      = cfg.name;
document.getElementById('prof-specialty').textContent = cfg.profession;

var cityText = cfg.city;
if(cfg.department && !cfg.city.includes(cfg.department)) cityText += (cfg.city ? ', ' : '') + cfg.department;
document.getElementById('prof-city').textContent = cityText || 'Colombia';

// ── Construir links ──────────────────────────────
var loc  = window.location.href.split('?')[0];
var base = loc.substring(0, loc.lastIndexOf('/') + 1);

var agendarParams = new URLSearchParams({
  name: cfg.name, profession: cfg.profession,
  email: cfg.email, city: cfg.city, department: cfg.department,
  api_key: cfg.api_key, apps_script: cfg.apps_script,
  am_start: cfg.am_start, am_end: cfg.am_end,
  pm_enabled: cfg.pm_enabled, pm_start: cfg.pm_start, pm_end: cfg.pm_end,
  days: cfg.days, duration: cfg.duration, buffer: cfg.buffer,
  primary: cfg.primary, accent: cfg.accent, gold: cfg.gold
});
document.getElementById('btn-agendar').href = base + 'agendar.html?' + agendarParams.toString();

// ── Partículas ───────────────────────────────────
var container = document.getElementById('particles');
for(var i = 0; i < 18; i++){
  (function(){
    var p = document.createElement('div');
    p.className = 'particle';
    var size = Math.random() * 80 + 20;
    p.style.cssText = [
      'width:' + size + 'px',
      'height:' + size + 'px',
      'left:' + Math.random() * 100 + '%',
      'animation-duration:' + (Math.random() * 12 + 8) + 's',
      'animation-delay:' + (Math.random() * 10) + 's'
    ].join(';');
    container.appendChild(p);
  })();
}
</script>
</body>
</html>
